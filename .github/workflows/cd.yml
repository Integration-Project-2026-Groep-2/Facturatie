name: Build & Deploy Image to Dev

on:
    workflow_run:
        workflows: ["CI"]
        branches: [main]
        types: [completed]

env:
    SERVICE_NAME: billing_app
    IMAGE: ghcr.io/integration-project-2026-groep-2/facturatie

jobs:
    build-and-push:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        outputs:
            image_tag: ${{ steps.image_meta.outputs.image_tag }}
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - name: Compute image tag
              id: image_meta
              run: echo "image_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push image (cached)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: docker/php/Dockerfile
                  push: true
                  tags: |
                      ${{ env.IMAGE }}:${{ steps.image_meta.outputs.image_tag }}
                      ${{ env.IMAGE }}:latest-dev
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    trigger-k8s-manifest-update:
        name: Trigger Manifest Repo Update
        runs-on: ubuntu-latest
        needs: build-and-push

        steps:
          - name: Dispatch to k8s-manifests repo
            uses: peter-evans/repository-dispatch@v3
            with:
              token: ${{ secrets.MANIFESTS_REPO_PAT }}
              repository: integration-project-2026-groep-2/k8s-manifests
              event-type: update-dev-image
              client-payload: |
                {
                  "image": "${{ env.IMAGE }}",
                  "tag": "${{ needs.build-and-push.outputs.image_tag }}",
                  "service": "${{ github.event.repository.name }}",
                  "commit": "${{ github.sha }}",
                  "actor": "${{ github.actor }}"
                }
