server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.php index.html;

    # FOSSBilling URL Rewriting
    location / {
        try_files $uri $uri/ @rewrite;
    }

    # Serve theme favicon at root to avoid 404 when browser requests /favicon.ico
    location = /favicon.ico {
        try_files /themes/huraga/assets/favicon.ico =404;
    }

    location @rewrite {
        rewrite ^/(.*)$ /index.php?_url=/$1;
    }

    # Pass PHP scripts to the 'app' container
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_intercept_errors on;
        fastcgi_pass app:9000; 
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_index index.php;
    }

    # Allow access to API.js (needed by frontend)
    location = /library/Api/API.js {
        allow all;
        add_header 'Access-Control-Allow-Origin' '*';
    }

    # Deny access to sensitive FOSSBilling files
    location ~* ^/(data|library|config\.php) {
        deny all;
    }
}